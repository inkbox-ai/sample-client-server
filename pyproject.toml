# pyproject.toml

[project]
name = "sample-client-server"
version = "0.1.0"
description = "Sample Inkbox webhook receiver + phone media stream server"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115,<0.120",
  "inkbox==0.2.10",
  "python-dotenv>=1,<2",
  "uvicorn[standard]>=0.30,<0.40",
  "websockets>=12,<16",
]

[project.scripts]
inkbox-webhook = "server:main"
inkbox-phone-media = "media_stream:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src"]
sources = ["src"]
